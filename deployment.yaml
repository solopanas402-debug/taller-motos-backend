      Handler: main.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Environment:
        Variables:
          DB_URL:
            Ref: DBUrl
          DB_KEY:
            Ref: DBKey
          COGNITO_USER_POOL_ID:
            Ref: MotorcycleRepairShopUserPool
          COGNITO_APP_CLIENT_ID:
            Ref: MotorcycleRepairShopUserPoolClient
          COGNITO_DOMAIN: motorcycle-repair-shop-user-pool
      Events:
        ApiEvent:
          Type: Api
