AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Backend en Python con Lambdas y API Gateway
Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
    MemorySize: 256
    Environment:
      Variables:
        CORS_ORIGIN: '*'
  Api:
    Cors:
      AllowMethods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Requested-With'"
      AllowOrigin: "'*'"
      MaxAge: "'600'"
Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
    - dev
    - stage
    - prod
  DBUrl:
    Type: String
    Default: https://toklwbqrgqsgaovzleev.supabase.co
  DBKey:
    Type: String
    Default: sb_publishable_9ToFd0mY6_QhXaGecuwxQA_ixnC9hQ0
  LogRetentionDays:
    Type: Number
    Default: 14
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName:
        Ref: Environment
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn:
              Fn::GetAtt:
              - MotorcycleRepairShopUserPool
              - Arn
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
  MotorcycleRepairShopUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: motorcycle-repair-shop-user-pool
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
  MyUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: motorcycle-repair-auth
      UserPoolId:
        Ref: MotorcycleRepairShopUserPool
    DependsOn: MotorcycleRepairShopUserPool
  MotorcycleRepairShopResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId:
        Ref: MotorcycleRepairShopUserPool
      Identifier: motorcycerepairshop-api
      Name: Motorcycle Repair Shop API
      Scopes:
      - ScopeName: create
        ScopeDescription: Create access
      - ScopeName: read
        ScopeDescription: Read access
      - ScopeName: update
        ScopeDescription: Update access
      - ScopeName: delete
        ScopeDescription: Delete access
    DependsOn: MotorcycleRepairShopUserPool
  MotorcycleRepairShopUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: motorcycle-repair-shop-client
      UserPoolId:
        Ref: MotorcycleRepairShopUserPool
      GenerateSecret: true
      AllowedOAuthFlows:
      - client_credentials
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
      - Fn::Sub: motorcycerepairshop-api/create
      - Fn::Sub: motorcycerepairshop-api/read
      - Fn::Sub: motorcycerepairshop-api/update
      - Fn::Sub: motorcycerepairshop-api/delete
    DependsOn:
    - MotorcycleRepairShopUserPool
    - MotorcycleRepairShopResourceServer
    - MyUserPoolDomain
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-layer
      Description: Shared utilities for Lambdas
      ContentUri: s3://aws-sam-cli-managed-default-samclisourcebucket-onon5eakfl9a/5f7874695fc783950f0953e0bbd16b16
      CompatibleRuntimes:
      - python3.12
    Metadata:
      BuildMethod: python3.12
      BuildProperties:
        PIP_REQUIREMENTS: requirements.txt
  GetCustomersApiFunction:
    Type: AWS::Serverless::Function
