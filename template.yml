AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Backend en Python con Lambdas y API Gateway

Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
    MemorySize: 256
    Environment:
      Variables:
        CORS_ORIGIN: "*"
  Api:
    Cors:
      AllowMethods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Requested-With'"
      AllowOrigin: "'*'"
      MaxAge: "'600'"
#    Auth:
#      DefaultAuthorizer: CognitoAuthorizer
#      Authorizers:
#        CognitoAuthorizer:
#          UserPoolArn: !GetAtt MotorcycleRepairShopUserPool.Arn

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - stage
      - prod
  DBUrl:
    Type: String
    Default: https://ygmozqwtzcvyqiekhqce.supabase.co
  DBKey:
    Type: String
    Default: sb_publishable_pa3AhahiiA4VyvWIk-lGnw_tHocqZRl
  LogRetentionDays:
    Type: Number
    Default: 14

Resources:
  # === IAM ROLE ===
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "LambdaExecutionRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt MotorcycleRepairShopUserPool.Arn
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Amz-Security-Token'"
        AllowOrigin: "'*'"


#  # === LAMBDA ÚNICA PARA TODOS LOS OPTIONS PARA PREFLIGHT CORS ===
#  GlobalOptionsFunction:
#    Type: AWS::Serverless::Function
#    Properties:
#      FunctionName: !Sub "GlobalOptions-${Environment}"
#      CodeUri: layers/shared/lambdas/cors_preflight
#      Handler: main.lambda_handler
#      Timeout: 3
#      MemorySize: 128
#      Layers:
#        - !Ref SharedLayer  # ✅ AGREGAR ESTO (para ResponseUtils)
#      Events:
#        CatchAllOptions:
#          Type: Api
#          Properties:
#            # O si tienes MyApi explícito: RestApiId: !Ref MyApi
#            Path: /{proxy+}
#            Method: options
#            Auth:
#              Authorizer: NONE

  # === USER POOL ===
  MotorcycleRepairShopUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: motorcycle-repair-shop-user-pool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  # === DOMAIN ===
  MyUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: motorcycle-repair-shop-user-pool
      UserPoolId: !Ref MotorcycleRepairShopUserPool

  # === RESOURCE SERVER ===
  MotorcycleRepairShopResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref MotorcycleRepairShopUserPool
      Identifier: motorcycerepairshop-api
      Name: Motorcycle Repair Shop API
      Scopes:
        - ScopeName: create
          ScopeDescription: "Create access"
        - ScopeName: read
          ScopeDescription: "Read access"
        - ScopeName: update
          ScopeDescription: "Update access"
        - ScopeName: delete
          ScopeDescription: "Delete access"
    DependsOn: MotorcycleRepairShopUserPool

  # === APP CLIENT ===
  MotorcycleRepairShopUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: motorcycle-repair-shop-client
      UserPoolId: !Ref MotorcycleRepairShopUserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - !Sub "motorcycerepairshop-api/create"
        - !Sub "motorcycerepairshop-api/read"
        - !Sub "motorcycerepairshop-api/update"
        - !Sub "motorcycerepairshop-api/delete"
    DependsOn:
      - MotorcycleRepairShopUserPool
      - MotorcycleRepairShopResourceServer

  # === LAYERS ===
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-layer
      Description: "Shared utilities for Lambdas"
      ContentUri: layers/shared
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12
      BuildProperties:
        PIP_REQUIREMENTS: requirements.txt

