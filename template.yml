AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Backend en Python con Lambdas y API Gateway

Globals:
  Function:
    Timeout: 10
    Runtime: python3.11
    MemorySize: 256
    Environment:
      Variables:
        CORS_ORIGIN: "*"
  Api:
    Cors:
      AllowMethods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Requested-With,x-tenant-id'"
      AllowOrigin: "'*'"
      MaxAge: "'600'"
#    Auth:
#      DefaultAuthorizer: CognitoAuthorizer
#      Authorizers:
#        CognitoAuthorizer:
#          UserPoolArn: !GetAtt MotorcycleRepairShopUserPool.Arn

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - stage
      - prod
  DBUrl:
    Type: String
    Default: https://toklwbqrgqsgaovzleev.supabase.co
  DBKey:
    Type: String
    Default: sb_publishable_9ToFd0mY6_QhXaGecuwxQA_ixnC9hQ0
  LogRetentionDays:
    Type: Number
    Default: 14

Resources:
  # === IAM ROLE (general) ===
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      # RoleName: !Sub "LambdaExecutionRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Amz-Security-Token,x-tenant-id'"
        AllowOrigin: "'*'"

  #  # === LAMBDA ÚNICA PARA TODOS LOS OPTIONS PARA PREFLIGHT CORS ===
  #  GlobalOptionsFunction:
  #    Type: AWS::Serverless::Function
  #    Properties:
  #      FunctionName: !Sub "GlobalOptions-${Environment}"
  #      CodeUri: layers/shared/lambdas/cors_preflight
  #      Handler: main.lambda_handler
  #      Timeout: 3
  #      MemorySize: 128
  #      Layers:
  #        - !Ref SharedLayer  # ✅ AGREGAR ESTO (para ResponseUtils)
  #      Events:
  #        CatchAllOptions:
  #          Type: Api
  #          Properties:
  #            # O si tienes MyApi explícito: RestApiId: !Ref MyApi
  #            Path: /{proxy+}
  #            Method: options
  #            Auth:
  #              Authorizer: NONE

  # === USER POOL ===
  MotorcycleRepairShopUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: motorcycle-repair-shop-user-pool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  # === DOMAIN ===
  MyUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: motorcycle-repair-auth
      UserPoolId: !Ref MotorcycleRepairShopUserPool
    DependsOn: MotorcycleRepairShopUserPool

  # === RESOURCE SERVER ===
  MotorcycleRepairShopResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref MotorcycleRepairShopUserPool
      Identifier: motorcycerepairshop-api
      Name: Motorcycle Repair Shop API
      Scopes:
        - ScopeName: create
          ScopeDescription: "Create access"
        - ScopeName: read
          ScopeDescription: "Read access"
        - ScopeName: update
          ScopeDescription: "Update access"
        - ScopeName: delete
          ScopeDescription: "Delete access"
    DependsOn: MotorcycleRepairShopUserPool

  # === APP CLIENT ===
  MotorcycleRepairShopUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: motorcycle-repair-shop-client
      UserPoolId: !Ref MotorcycleRepairShopUserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - !Sub "motorcycerepairshop-api/create"
        - !Sub "motorcycerepairshop-api/read"
        - !Sub "motorcycerepairshop-api/update"
        - !Sub "motorcycerepairshop-api/delete"
    DependsOn:
      - MotorcycleRepairShopUserPool
      - MotorcycleRepairShopResourceServer
      - MyUserPoolDomain


  # === IAM ROLE (auth Lambdas) - acceso a cognito-idp ===
  AuthLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoAuthPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:InitiateAuth
                  - cognito-idp:GlobalSignOut
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminDeleteUser
                Resource: !GetAtt MotorcycleRepairShopUserPool.Arn

  # === APP CLIENT (usuarios humanos - USER_PASSWORD_AUTH) ===
  UserAppClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: motorcycle-repair-shop-user-client
      UserPoolId: !Ref MotorcycleRepairShopUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AccessTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        RefreshToken: days
    DependsOn:
      - MotorcycleRepairShopUserPool
  # === LAYERS ===
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-layer
      Description: "Shared utilities for Lambdas"
      ContentUri: layers/shared
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11
      BuildProperties:
        PIP_REQUIREMENTS: requirements.txt

  # ============================================
  # === AUTH ===
  # ============================================
  LoginApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "LoginApi-${Environment}"
      Layers:
        - !Ref SharedLayer
      CodeUri: src/domains/auth/lambdas/login
      Handler: main.lambda_handler
      Role: !GetAtt AuthLambdaExecutionRole.Arn
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref MotorcycleRepairShopUserPool
          COGNITO_USER_APP_CLIENT_ID: !Ref UserAppClient
          DB_URL: !Ref DBUrl
          DB_KEY: !Ref DBKey
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /auth/login
            Method: post

  LoginApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/LoginApi-${Environment}"
      RetentionInDays: !Ref LogRetentionDays
    DeletionPolicy: Retain
    DependsOn: LoginApiFunction

