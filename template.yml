  GetCustomersApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "GetCustomersApi-${Environment}"
      Layers:
        - !Ref SharedLayer
      CodeUri: src/domains/customers/lambdas/get_customers
      Handler: main.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DB_URL: !Ref DBUrl
          DB_KEY: !Ref DBKey
          COGNITO_USER_POOL_ID: !Ref MotorcycleRepairShopUserPool
          COGNITO_APP_CLIENT_ID: !Ref MotorcycleRepairShopUserPoolClient
          COGNITO_DOMAIN: motorcycle-repair-shop-user-pool
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /customers
            Method: get
            Auth:
              Authorizer: CognitoAuthorizer
              AuthorizationScopes:
                - motorcycerepairshop-api/read
  #            Cors:
  #              AllowOrigin: "'*'"
  #              AllowHeaders: "'Content-Type,Authorization'"
  #              AllowMethods: "'OPTIONS,GET'"

