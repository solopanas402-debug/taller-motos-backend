AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Backend en Python con Lambdas y API Gateway
Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
    MemorySize: 256
Resources:
  CustomersApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CustomersApiFunction
      Handler: handler.lambda_handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /customers
            Method: get
    Metadata:
      SamResourceId: CustomersApiFunction
  MechanicsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: MechanicsApiFunction
      Handler: handler.lambda_handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /mechanics
            Method: get
    Metadata:
      SamResourceId: MechanicsApiFunction
  ProductsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ProductsApiFunction
      Handler: handler.lambda_handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products
            Method: get
    Metadata:
      SamResourceId: ProductsApiFunction
  ProvidersApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ProvidersApiFunction
      Handler: handler.lambda_handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /providers
            Method: get
    Metadata:
      SamResourceId: ProvidersApiFunction
